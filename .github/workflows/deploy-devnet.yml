name: Deploy Devnet

on:
  push:
    branches: [devnet]
    paths-ignore:
      - "**.md"
      - "lessons/**"
      - "**/e2e/**"
      - "**/*.test.ts"
      - "**/playwright.config.ts"
  workflow_dispatch:
    inputs:
      force_server_rebuild:
        description: "Force server rebuild (even if bb version is cached)"
        type: boolean
        default: false
      deploy_app:
        description: "Deploy frontend app"
        type: boolean
        default: true
      publish_sdk:
        description: "Publish SDK to npm (devnet tag)"
        type: boolean
        default: true

concurrency:
  group: deploy-devnet
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  # ── Check if shared server has the required bb version ────────
  check-server:
    name: Check Server Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      needs_rebuild: ${{ steps.check.outputs.needs_rebuild }}
      aztec_version: ${{ steps.version.outputs.aztec_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract required Aztec version
        id: version
        run: echo "aztec_version=$(jq -r '.dependencies["@aztec/stdlib"]' packages/sdk/package.json)" >> "$GITHUB_OUTPUT"

      - name: Force rebuild on manual dispatch
        if: inputs.force_server_rebuild
        id: force
        run: echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"

      - name: Install SSM plugin
        if: "!inputs.force_server_rebuild"
        run: |
          curl -sL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Configure AWS credentials
        if: "!inputs.force_server_rebuild"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check server for required bb version
        if: "!inputs.force_server_rebuild"
        id: check
        env:
          INSTANCE_ID: ${{ secrets.PROD_TEE_INSTANCE_ID }}
          AZTEC_VERSION: ${{ steps.version.outputs.aztec_version }}
        run: |
          # SSM tunnel to prod instance (prover on port 80)
          aws ssm start-session \
            --target "${INSTANCE_ID}" \
            --document-name AWS-StartPortForwardingSession \
            --parameters '{"portNumber":["80"],"localPortNumber":["4002"]}' &
          TUNNEL_PID=$!
          trap 'kill $TUNNEL_PID 2>/dev/null' EXIT

          # Wait for tunnel
          for i in $(seq 1 30); do
            curl -sf --max-time 2 http://localhost:4002/health > /dev/null 2>&1 && break
            if [ "$i" = "30" ]; then
              echo "Could not reach server — rebuild required"
              echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 2
          done

          VERSIONS=$(curl -sf http://localhost:4002/health | jq -r '.available_versions[]' 2>/dev/null || echo "")
          echo "Server available versions: ${VERSIONS}"
          echo "Required version: ${AZTEC_VERSION}"

          if echo "$VERSIONS" | grep -qF "${AZTEC_VERSION}"; then
            echo "Server has required bb version — no rebuild needed"
            echo "needs_rebuild=false" >> "$GITHUB_OUTPUT"
          else
            echo "Server missing bb version — rebuild required"
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Build base image (only if server rebuild needed) ──────────
  ensure-base:
    name: Build Base Image
    needs: check-server
    if: needs.check-server.outputs.needs_rebuild == 'true' || inputs.force_server_rebuild
    uses: ./.github/workflows/_build-base.yml
    secrets: inherit

  # ── Rebuild server on shared prod instance (only if needed) ───
  rebuild-server:
    name: Rebuild Server
    needs: [check-server, ensure-base]
    if: needs.check-server.outputs.needs_rebuild == 'true' || inputs.force_server_rebuild
    uses: ./.github/workflows/_deploy-unified.yml
    secrets: inherit
    with:
      environment: prod
      nitro_image_tag: prod-tee
      host_image_tag: prod-host
      base_tag: ${{ needs.ensure-base.outputs.base_tag }}

  # ── Validate devnet against shared prod instance ──────────────
  validate-devnet:
    name: Validate Devnet
    needs: [check-server, rebuild-server]
    if: |
      !cancelled()
      && (needs.rebuild-server.result == 'success' || needs.rebuild-server.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install SSM plugin
        run: |
          curl -sL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Start SSM tunnels to shared instance
        run: |
          # Both services run on the shared prod instance (TEE on 4000, prover on 80)
          aws ssm start-session \
            --target "${{ secrets.PROD_TEE_INSTANCE_ID }}" \
            --document-name AWS-StartPortForwardingSession \
            --parameters '{"portNumber":["80"],"localPortNumber":["4002"]}' &
          echo "PROVER_TUNNEL_PID=$!" >> "$GITHUB_ENV"

          aws ssm start-session \
            --target "${{ secrets.PROD_TEE_INSTANCE_ID }}" \
            --document-name AWS-StartPortForwardingSession \
            --parameters '{"portNumber":["4000"],"localPortNumber":["4001"]}' &
          echo "TEE_TUNNEL_PID=$!" >> "$GITHUB_ENV"

          echo "Waiting for SSM tunnels..."
          for i in $(seq 1 30); do
            PROVER_OK=false
            TEE_OK=false
            curl -sf --max-time 5 http://localhost:4002/attestation > /dev/null 2>&1 && PROVER_OK=true
            curl -sf --max-time 5 http://localhost:4001/attestation > /dev/null 2>&1 && TEE_OK=true
            if [ "$PROVER_OK" = "true" ] && [ "$TEE_OK" = "true" ]; then
              echo "Both SSM tunnels ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "SSM tunnels failed to connect after 60s"
          exit 1

      - name: Run SDK E2E tests
        env:
          AZTEC_NODE_URL: ${{ secrets.DEVNET_AZTEC_NODE_URL }}
          PROVER_URL: http://localhost:4002
          TEE_URL: http://localhost:4001
        run: bun run --cwd packages/sdk test:e2e

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run app smoke E2E
        env:
          AZTEC_NODE_URL: ${{ secrets.DEVNET_AZTEC_NODE_URL }}
          PROVER_URL: http://localhost:4002
          TEE_URL: http://localhost:4001
        run: bunx playwright test --project=smoke --workers=1
        working-directory: packages/app

      - name: Cleanup SSM tunnels
        if: always()
        run: |
          kill "$PROVER_TUNNEL_PID" 2>/dev/null || true
          kill "$TEE_TUNNEL_PID" 2>/dev/null || true

  # ── Build & deploy app to S3 + invalidate CloudFront ────────────
  deploy-app:
    name: Deploy App (devnet)
    needs: validate-devnet
    if: |
      !cancelled()
      && (github.event_name == 'push' || inputs.deploy_app)
      && (needs.validate-devnet.result == 'success' || needs.validate-devnet.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build app
        run: bun run --cwd packages/app build
        env:
          AZTEC_NODE_URL: ${{ secrets.DEVNET_AZTEC_NODE_URL }}
          PROVER_URL: ${{ secrets.DEVNET_CLOUDFRONT_URL }}/prover
          TEE_URL: ${{ secrets.DEVNET_CLOUDFRONT_URL }}/tee
          VITE_ENV_NAME: devnet
          VITE_OTHER_ENV_URL: https://nightlies.tee-rex.dev
          VITE_OTHER_ENV_NAME: nightlies

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync packages/app/dist/ s3://${{ secrets.DEVNET_S3_BUCKET }}/ \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"

          aws s3 cp packages/app/dist/index.html s3://${{ secrets.DEVNET_S3_BUCKET }}/index.html \
            --cache-control "max-age=60"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.DEVNET_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html"

  # ── Publish SDK to npm (devnet dist-tag) ────────────────────────
  publish-sdk:
    name: Publish SDK (devnet)
    needs: validate-devnet
    if: |
      !cancelled()
      && (github.event_name == 'push' || inputs.publish_sdk)
      && (needs.validate-devnet.result == 'success' || needs.validate-devnet.result == 'skipped')
    uses: ./.github/workflows/_publish-sdk.yml
    secrets: inherit
    with:
      dist_tag: devnet
      latest: false
