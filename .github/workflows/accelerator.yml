name: Accelerator

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      relevant: ${{ steps.override.outputs.relevant || steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'packages/accelerator/**'
              - 'biome.json'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/accelerator.yml'
      - name: Override for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        id: override
        run: echo "relevant=true" >> "$GITHUB_OUTPUT"

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/accelerator/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
        working-directory: .
      - name: Copy bb sidecar
        run: bun run --cwd packages/accelerator prebuild
        working-directory: .
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/accelerator/src-tauri -> target
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Rust Tests
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/accelerator/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
        working-directory: .
      - name: Copy bb sidecar
        run: bun run --cwd packages/accelerator prebuild
        working-directory: .
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/accelerator/src-tauri -> target
      - run: cargo test

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint

  e2e:
    name: E2E
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - uses: ./.github/actions/setup-aztec

      - name: Copy bb sidecar
        run: bun run --cwd packages/accelerator prebuild

      - name: Set BB_BINARY_PATH
        run: echo "BB_BINARY_PATH=$(pwd)/packages/accelerator/src-tauri/binaries/bb-x86_64-unknown-linux-gnu" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/accelerator/src-tauri -> target

      - name: Build headless accelerator server
        working-directory: packages/accelerator/src-tauri
        run: cargo build --bin accelerator-server

      - uses: ./.github/actions/start-services

      - name: Start headless accelerator server
        run: |
          cd packages/accelerator/src-tauri
          cargo run --bin accelerator-server > /tmp/accelerator.log 2>&1 &
          echo "ACCELERATOR_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for accelerator
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:59833/health > /dev/null 2>&1; then
              echo "Accelerator ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "Accelerator failed to respond within 30s"
          cat /tmp/accelerator.log 2>/dev/null || true
          exit 1

      - name: Run SDK E2E tests
        env:
          ACCELERATOR_URL: "http://127.0.0.1:59833"
        run: bun run --cwd packages/sdk test:e2e

      - name: Upload Aztec logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aztec-node-logs-accelerator-e2e
          path: /tmp/aztec-node.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload accelerator logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: accelerator-logs
          path: /tmp/accelerator.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup
        if: always()
        run: kill "$ACCELERATOR_PID" 2>/dev/null || true

  accelerator-status:
    name: Accelerator Status
    if: always()
    needs: [changes, clippy, test, lint, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check results
        run: |
          results="${{ needs.changes.result }} ${{ needs.clippy.result }} ${{ needs.test.result }} ${{ needs.lint.result }} ${{ needs.e2e.result }}"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "Job failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"
