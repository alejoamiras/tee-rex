name: _SDK E2E (reusable)

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout
        required: false
        type: string
        default: ""
      tee_url:
        description: TEE URL (enables TEE tests via SSM tunnel when set)
        required: false
        type: string
        default: ""
      aztec_node_url:
        description: Aztec node URL (skips local CLI install when not localhost)
        required: false
        type: string
        default: "http://localhost:8080"
      prover_url:
        description: Prover URL (skips local server start when not localhost)
        required: false
        type: string
        default: "http://localhost:4000"
      setup_prover_tunnel:
        description: Set up SSM tunnel to deployed prover instance
        required: false
        type: boolean
        default: false
      build_accelerator:
        description: Build and start headless accelerator server for accelerated proving tests
        required: false
        type: boolean
        default: false

jobs:
  e2e-sdk:
    name: SDK E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      # ── SSM Tunnels (TEE and/or prover) ──────────────────────────
      - name: Install SSM plugin
        if: inputs.tee_url != '' || inputs.setup_prover_tunnel
        run: |
          curl -sL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Configure AWS credentials
        if: inputs.tee_url != '' || inputs.setup_prover_tunnel
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Start SSM tunnel to TEE
        if: inputs.tee_url != ''
        run: |
          aws ssm start-session \
            --target "${{ secrets.TEE_INSTANCE_ID }}" \
            --document-name AWS-StartPortForwardingSession \
            --parameters '{"portNumber":["4000"],"localPortNumber":["4001"]}' &
          echo "TEE_TUNNEL_PID=$!" >> "$GITHUB_ENV"

          echo "Waiting for TEE SSM tunnel..."
          for i in $(seq 1 30); do
            if curl -sf --max-time 5 http://localhost:4001/attestation > /dev/null 2>&1; then
              echo "TEE SSM tunnel ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "TEE SSM tunnel failed to connect after 60s"
          exit 1

      - name: Start SSM tunnel to prover
        if: inputs.setup_prover_tunnel
        run: |
          aws ssm start-session \
            --target "${{ secrets.TEE_INSTANCE_ID }}" \
            --document-name AWS-StartPortForwardingSession \
            --parameters '{"portNumber":["80"],"localPortNumber":["4002"]}' &
          echo "PROVER_TUNNEL_PID=$!" >> "$GITHUB_ENV"

          echo "Waiting for prover SSM tunnel..."
          for i in $(seq 1 30); do
            if curl -sf --max-time 5 http://localhost:4002/attestation > /dev/null 2>&1; then
              echo "Prover SSM tunnel ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "Prover SSM tunnel failed to connect after 60s"
          exit 1

      # ── Setup & Run ───────────────────────────────────────────────
      - uses: ./.github/actions/setup-aztec
        with:
          skip_cli: ${{ inputs.aztec_node_url != 'http://localhost:8080' }}

      - uses: ./.github/actions/start-services
        with:
          aztec_node_url: ${{ inputs.aztec_node_url }}
          prover_url: ${{ inputs.prover_url }}

      # ── Accelerator (optional) ──────────────────────────────────────
      - name: Install system dependencies (accelerator)
        if: inputs.build_accelerator
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - name: Copy bb sidecar
        if: inputs.build_accelerator
        run: bun run --cwd packages/accelerator prebuild

      - name: Set BB_BINARY_PATH
        if: inputs.build_accelerator
        run: echo "BB_BINARY_PATH=$(pwd)/packages/accelerator/src-tauri/binaries/bb-x86_64-unknown-linux-gnu" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        if: inputs.build_accelerator

      - uses: Swatinem/rust-cache@v2
        if: inputs.build_accelerator
        with:
          workspaces: packages/accelerator/src-tauri -> target

      - name: Build headless accelerator server
        if: inputs.build_accelerator
        working-directory: packages/accelerator/src-tauri
        run: cargo build --bin accelerator-server

      - name: Start headless accelerator server
        if: inputs.build_accelerator
        run: |
          cd packages/accelerator/src-tauri
          cargo run --bin accelerator-server > /tmp/accelerator.log 2>&1 &
          echo "ACCELERATOR_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for accelerator
        if: inputs.build_accelerator
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:59833/health > /dev/null 2>&1; then
              echo "Accelerator ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "Accelerator failed to respond within 30s"
          cat /tmp/accelerator.log 2>/dev/null || true
          exit 1

      # ── Run tests ───────────────────────────────────────────────────
      - name: Run SDK E2E tests
        env:
          TEE_URL: ${{ inputs.tee_url }}
          AZTEC_NODE_URL: ${{ inputs.aztec_node_url }}
          PROVER_URL: ${{ inputs.prover_url }}
          ACCELERATOR_URL: ${{ inputs.build_accelerator && 'http://127.0.0.1:59833' || '' }}
        run: bun run --cwd packages/sdk test:e2e

      - name: Upload Aztec logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aztec-node-logs-sdk
          path: /tmp/aztec-node.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload accelerator logs
        if: failure() && inputs.build_accelerator
        uses: actions/upload-artifact@v4
        with:
          name: accelerator-logs
          path: /tmp/accelerator.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          kill "$TEE_TUNNEL_PID" 2>/dev/null || true
          kill "$PROVER_TUNNEL_PID" 2>/dev/null || true
          kill "$ACCELERATOR_PID" 2>/dev/null || true
