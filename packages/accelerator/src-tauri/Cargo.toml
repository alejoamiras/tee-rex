[package]
name = "tee-rex-accelerator"
version = "0.0.0"
description = "Native proving accelerator for Aztec transactions"
edition = "2021"
rust-version = "1.77.2"

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"
